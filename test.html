<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Custom T-Piece Sprite Test</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 32px;
      background:
        radial-gradient(ellipse at 20% 20%, #c8d8ff 0%, transparent 50%),
        radial-gradient(ellipse at 80% 10%, #e8c8f0 0%, transparent 40%),
        linear-gradient(135deg, #8fa8d8 0%, #9fa3d4 50%, #a8aad0 100%);
      font-family: -apple-system, system-ui, sans-serif;
      color: #1a2a4a;
    }
    h1 { font-size: 1.05rem; font-weight: 600; letter-spacing: 0.04em; opacity: 0.65; }
    .card {
      background: rgba(255,255,255,0.45);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(255,255,255,0.7);
      border-radius: 20px;
      padding: 32px 40px;
      box-shadow: 0 8px 32px rgba(80,100,180,0.15);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 14px;
    }
    .label { font-size: 0.75rem; font-weight: 500; letter-spacing: 0.1em; text-transform: uppercase; opacity: 0.5; }
    canvas { display: block; }
  </style>
</head>
<body>
  <h1>Custom T-Piece Sprite — Preview</h1>

  <div class="card">
    <div class="label">Full Piece</div>
    <canvas id="full"></canvas>
  </div>

  <div class="card">
    <div class="label">Bottom Block Detail — Slot Groove Close-up</div>
    <canvas id="zoom"></canvas>
  </div>

  <script>
    const CELL = 56;   // px per block
    const GAP  = 4;    // gap between blocks

    // ─── Shape ──────────────────────────────────────────
    //
    //  col:  0        1        2
    //  row 0: [QUAD]  [NORM]  [QUAD]    ← top bar
    //  row 1:         [NORM]            ← stem #1
    //  row 2:         [NORM]            ← stem #2
    //  row 3:         [NORM]            ← stem #3
    //  row 4:         [SLOT]            ← stem #4 — straight-line groove bottom

    const SHAPE = [
      ['quad', 'norm', 'quad'],
      [null,   'norm', null  ],
      [null,   'norm', null  ],
      [null,   'norm', null  ],
      [null,   'slot', null  ],
    ];

    const ROWS = SHAPE.length;     // 5
    const COLS = SHAPE[0].length;  // 3

    // ─── Palette ─────────────────────────────────────────
    const C_FILL   = 'rgba(185, 128, 55, 0.90)';
    const C_SHINE  = 'rgba(255, 210, 130, 0.60)';
    const C_EDGE   = 'rgba(255, 255, 255, 0.40)';
    const C_SHADOW = 'rgba(90, 50, 10, 0.30)';
    const C_SLOT   = 'rgba(50, 25, 5, 0.60)';

    // ─── Draw a normal block ──────────────────────────────
    function drawNorm(ctx, bx, by) {
      const r = 5;
      ctx.save();
      ctx.beginPath();
      ctx.roundRect(bx, by, CELL, CELL, r);
      ctx.fillStyle = C_FILL;
      ctx.fill();
      ctx.strokeStyle = C_EDGE;
      ctx.lineWidth = 1.5;
      ctx.stroke();
      // top shine
      ctx.beginPath();
      ctx.roundRect(bx + 4, by + 3, CELL - 8, CELL * 0.28, [3, 3, 5, 5]);
      ctx.fillStyle = C_SHINE;
      ctx.fill();
      // bottom shadow
      ctx.beginPath();
      ctx.roundRect(bx + 3, by + CELL - 6, CELL - 6, 5, [0, 0, 3, 3]);
      ctx.fillStyle = C_SHADOW;
      ctx.fill();
      ctx.restore();
    }

    // ─── Draw a QUAD block (2×2 decorative sub-blocks) ───
    // Four equal sub-squares fill the cell with a small gap between them.
    function drawQuad(ctx, bx, by) {
      const subGap = 4;
      const half = (CELL - subGap) / 2;
      const r = 4;
      const positions = [
        [bx,          by         ],   // top-left
        [bx + half + subGap, by         ],   // top-right
        [bx,          by + half + subGap],   // bottom-left
        [bx + half + subGap, by + half + subGap],   // bottom-right
      ];
      ctx.save();
      for (const [sx, sy] of positions) {
        // fill
        ctx.beginPath();
        ctx.roundRect(sx, sy, half, half, r);
        ctx.fillStyle = C_FILL;
        ctx.fill();
        ctx.strokeStyle = C_EDGE;
        ctx.lineWidth = 1.2;
        ctx.stroke();
        // mini shine on each sub-block
        ctx.beginPath();
        ctx.roundRect(sx + 3, sy + 2, half - 6, half * 0.28, [2, 2, 4, 4]);
        ctx.fillStyle = C_SHINE;
        ctx.fill();
      }
      ctx.restore();
    }

    // ─── Draw the SLOT block (straight-line groove bottom) ─
    // Same width as the arc version (2 × 0.28 × CELL), rectangular cut.
    function drawSlot(ctx, bx, by) {
      const r = 5;
      const slotW = CELL * 0.56;          // same span as arc diameter
      const slotH = CELL * 0.28;          // depth = roughly same as arc radius
      const slotX = bx + (CELL - slotW) / 2;
      const slotBottom = by + CELL;

      ctx.save();

      // Block outline — rectangular bottom corners where slot is
      ctx.beginPath();
      // top side (rounded corners)
      ctx.moveTo(bx + r, by);
      ctx.lineTo(bx + CELL - r, by);
      ctx.arcTo(bx + CELL, by, bx + CELL, by + r, r);
      // right side
      ctx.lineTo(bx + CELL, slotBottom);
      // bottom: right section → slot right wall → flat slot bottom → slot left wall → left section
      ctx.lineTo(slotX + slotW, slotBottom);
      ctx.lineTo(slotX + slotW, slotBottom - slotH);   // slot right wall (goes UP)
      ctx.lineTo(slotX,         slotBottom - slotH);   // flat slot floor
      ctx.lineTo(slotX,         slotBottom);            // slot left wall (goes DOWN)
      ctx.lineTo(bx, slotBottom);
      // left side
      ctx.lineTo(bx, by + r);
      ctx.arcTo(bx, by, bx + r, by, r);
      ctx.closePath();

      ctx.fillStyle = C_FILL;
      ctx.fill();
      ctx.strokeStyle = C_EDGE;
      ctx.lineWidth = 1.5;
      ctx.stroke();

      // top shine
      ctx.beginPath();
      ctx.roundRect(bx + 4, by + 3, CELL - 8, CELL * 0.28, [3, 3, 5, 5]);
      ctx.fillStyle = C_SHINE;
      ctx.fill();

      // slot interior shadow (makes the groove look recessed)
      ctx.beginPath();
      ctx.rect(slotX + 1, slotBottom - slotH + 1, slotW - 2, slotH - 1);
      ctx.fillStyle = C_SLOT;
      ctx.fill();

      // slot edge highlight (top inner edge of the groove)
      ctx.beginPath();
      ctx.moveTo(slotX + 1, slotBottom - slotH + 2);
      ctx.lineTo(slotX + slotW - 1, slotBottom - slotH + 2);
      ctx.strokeStyle = 'rgba(255,180,80,0.30)';
      ctx.lineWidth = 1;
      ctx.stroke();

      ctx.restore();
    }

    // ─── Render to a canvas ───────────────────────────────
    function render(cv, scale) {
      scale = scale || 1;
      const PAD = Math.round(20 * scale);
      const S   = Math.round(CELL * scale);
      const G   = Math.round(GAP  * scale);
      cv.width  = COLS * (S + G) - G + PAD * 2;
      cv.height = ROWS * (S + G) - G + PAD * 2;
      const ctx = cv.getContext('2d');
      if (scale !== 1) ctx.scale(scale, scale);

      const origCell = CELL;
      // temporarily override CELL for drawing (achieved via closure — we draw manually)
      for (let row = 0; row < ROWS; row++) {
        for (let col = 0; col < COLS; col++) {
          const type = SHAPE[row][col];
          if (!type) continue;
          const bx = (PAD + col * (CELL + GAP)) / scale * scale - (scale - 1) * 0 | 0;
          const by = (PAD + row * (CELL + GAP)) / scale * scale - (scale - 1) * 0 | 0;
          // pixel positions
          const px = PAD / scale + col * (CELL + GAP);
          const py = PAD / scale + row * (CELL + GAP);
          if (type === 'quad') drawQuad(ctx, px, py);
          else if (type === 'norm') drawNorm(ctx, px, py);
          else if (type === 'slot') drawSlot(ctx, px, py);
        }
      }
    }

    // Full piece (1×)
    render(document.getElementById('full'), 1);

    // Zoom in on just the slot block (3×)
    (function() {
      const scale = 3;
      const PAD = 24;
      const cv = document.getElementById('zoom');
      cv.width  = CELL * scale + PAD * 2;
      cv.height = CELL * scale + PAD * 2;
      const ctx = cv.getContext('2d');
      ctx.scale(scale, scale);
      drawSlot(ctx, PAD / scale, PAD / scale);
    })();
  </script>
</body>
</html>
