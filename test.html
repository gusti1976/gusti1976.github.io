<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Grid Preview — Tetris Flare</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 28px;
      padding: 32px 16px;
      background:
        radial-gradient(ellipse at 20% 20%, #c8d8ff 0%, transparent 50%),
        radial-gradient(ellipse at 80% 10%, #e8c8f0 0%, transparent 40%),
        linear-gradient(135deg, #8fa8d8 0%, #9fa3d4 50%, #a8aad0 100%);
      font-family: -apple-system, system-ui, sans-serif;
      color: #1a2a4a;
    }
    h1 { font-size: 1.1rem; font-weight: 700; letter-spacing: 0.05em; opacity: 0.7; }
    .row {
      display: flex;
      gap: 24px;
      flex-wrap: wrap;
      justify-content: center;
    }
    .option {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
    }
    .label {
      font-size: 0.72rem;
      font-weight: 600;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      opacity: 0.6;
    }
    canvas {
      border-radius: 10px;
      box-shadow: 0 4px 20px rgba(40,60,140,0.18);
    }
  </style>
</head>
<body>
  <h1>Grid line options — pick your favourite</h1>
  <div class="row" id="previews"></div>

  <script>
    const COLS = 10, ROWS = 14, CELL = 26;
    const W = COLS * CELL, H = ROWS * CELL;

    // Sample locked pieces to make it feel real
    const PIECES = [
      { color: 'rgba(80,200,255,0.82)',  cells: [[11,0],[11,1],[12,0],[12,1]] },
      { color: 'rgba(255,100,80,0.82)',  cells: [[10,4],[11,4],[11,5],[12,5]] },
      { color: 'rgba(120,220,120,0.82)', cells: [[12,6],[12,7],[11,7],[11,8]] },
      { color: 'rgba(255,200,60,0.82)',  cells: [[11,2],[11,3],[11,4]] },
      { color: 'rgba(185,128,55,0.88)',  cells: [[9,1],[9,2],[9,3],[10,2],[11,2],[12,2]] },
    ];

    const grids = [
      { label: 'A — Current (0.22)',   color: 'rgba(180,200,255,0.22)', width: 0.4 },
      { label: 'B — Soft gray',        color: 'rgba(140,150,170,0.30)', width: 0.5 },
      { label: 'C — Medium gray',      color: 'rgba(110,120,145,0.45)', width: 0.5 },
      { label: 'D — Stronger gray',    color: 'rgba(90,100,125,0.60)',  width: 0.5 },
      { label: 'E — Dark charcoal',    color: 'rgba(60,70,95,0.75)',    width: 0.5 },
    ];

    function drawCell(ctx, r, c, color) {
      const x = c * CELL + 1, y = r * CELL + 1, s = CELL - 2;
      const rad = s * 0.18;
      ctx.beginPath();
      ctx.moveTo(x + rad, y);
      ctx.lineTo(x + s - rad, y);
      ctx.quadraticCurveTo(x + s, y, x + s, y + rad);
      ctx.lineTo(x + s, y + s - rad);
      ctx.quadraticCurveTo(x + s, y + s, x + s - rad, y + s);
      ctx.lineTo(x + rad, y + s);
      ctx.quadraticCurveTo(x, y + s, x, y + s - rad);
      ctx.lineTo(x, y + rad);
      ctx.quadraticCurveTo(x, y, x + rad, y);
      ctx.closePath();
      ctx.fillStyle = color;
      ctx.fill();
      // Highlight
      const g = ctx.createLinearGradient(x, y, x, y + s * 0.5);
      g.addColorStop(0, 'rgba(255,255,255,0.28)');
      g.addColorStop(1, 'rgba(255,255,255,0)');
      ctx.fillStyle = g;
      ctx.fill();
    }

    function buildPreview(grid) {
      const wrap = document.createElement('div');
      wrap.className = 'option';
      const lbl = document.createElement('div');
      lbl.className = 'label';
      lbl.textContent = grid.label;
      const canvas = document.createElement('canvas');
      canvas.width = W; canvas.height = H;
      const ctx = canvas.getContext('2d');

      // Background
      const bg = ctx.createLinearGradient(0, 0, W, H);
      bg.addColorStop(0, 'rgba(18,28,70,0.92)');
      bg.addColorStop(1, 'rgba(30,20,60,0.92)');
      ctx.fillStyle = bg;
      ctx.fillRect(0, 0, W, H);

      // Grid
      ctx.strokeStyle = grid.color;
      ctx.lineWidth = grid.width;
      for (let r = 0; r <= ROWS; r++) {
        ctx.beginPath(); ctx.moveTo(0, r * CELL); ctx.lineTo(W, r * CELL); ctx.stroke();
      }
      for (let c = 0; c <= COLS; c++) {
        ctx.beginPath(); ctx.moveTo(c * CELL, 0); ctx.lineTo(c * CELL, H); ctx.stroke();
      }

      // Pieces
      PIECES.forEach(p => p.cells.forEach(([r, c]) => drawCell(ctx, r, c, p.color)));

      wrap.appendChild(lbl);
      wrap.appendChild(canvas);
      return wrap;
    }

    const row = document.getElementById('previews');
    grids.forEach(g => row.appendChild(buildPreview(g)));
  </script>
</body>
</html>
