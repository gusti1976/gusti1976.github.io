<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Hercules Character Concepts</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#1a1208;color:#e8d8a0;font-family:'Courier New',monospace;
     display:flex;flex-direction:column;align-items:center;padding:30px;gap:24px}
h1{color:#f0b020;letter-spacing:4px;text-transform:uppercase;font-size:1.1rem}
.subtitle{color:#7a6840;font-size:0.72rem}
.row{display:flex;gap:48px;flex-wrap:wrap;justify-content:center;align-items:flex-start}
.concept{display:flex;flex-direction:column;align-items:center;gap:10px}
.concept-label{color:#c8a030;font-size:0.72rem;letter-spacing:2px;text-transform:uppercase}
.concept-desc{color:#9a8858;font-size:0.62rem;max-width:200px;text-align:center;line-height:1.6}
.poses{display:flex;gap:12px;align-items:flex-end}
.pose{display:flex;flex-direction:column;align-items:center;gap:6px}
.pose-label{color:#5a4830;font-size:0.58rem;letter-spacing:1px}
canvas{image-rendering:pixelated;border:1px solid #2a1a08;background:#0c0804}
.highlight .concept-label{color:#f0b020}
.highlight canvas{border-color:#c8a030}
</style>
</head>
<body>
<h1>Hercules — Character Concepts</h1>
<p class="subtitle">Rectangle-only sprites · same rendering engine as the game</p>

<div class="row" id="root"></div>

<script>
// ── Palettes ─────────────────────────────────────────────────────────────────
const PALETTES = {
  A: { skin:'#c8a060', skirt:'#c8a030', skirtDk:'#a07820', belt:'#804020',
       sandal:'#703818', hair:'#2a1a08', shadow:'#9a7030', muscle:'#b08848',
       gold:'#f0c030', leaf:'#386830' },
  B: { skin:'#c09050', skirt:'#e8e0c0', skirtDk:'#b8b090', belt:'#603818',
       sandal:'#503010', hair:'#1a1208', shadow:'#8a6828', muscle:'#a87838',
       gold:'#d4a820', leaf:'#4a7840' },
  C: { skin:'#c8a060', skirt:'#8b1a1a', skirtDk:'#6a1010', belt:'#c8a030',
       sandal:'#703818', hair:'#2a1a08', shadow:'#9a7030', muscle:'#b08848',
       gold:'#f0c030', leaf:'#386830' },
  D: { skin:'#b88040', skirt:'#c89030', skirtDk:'#a07020', belt:'#8b4500',
       sandal:'#603010', hair:'#1a0800', shadow:'#8a6020', muscle:'#a07030',
       gold:'#e0b820', leaf:'#386030' },
};

// ── Draw Hercules ─────────────────────────────────────────────────────────────
// Origin = bottom-centre of character (feet). All coords in game-pixels.
// Call after ctx.translate(cx, cy) and ctx.scale(S,S).
function drawHercules(ctx, pal, pose) {
  const { skin, skirt, skirtDk, belt, sandal, hair, shadow, muscle, gold, leaf } = pal;

  // animated leg swing for 'run'
  const t   = performance.now() / 1000;
  const sw  = pose === 'run' ? Math.sin(t * 8) * 9 : (pose === 'walk' ? Math.sin(t*5)*5 : 0);
  const armSw = pose === 'run' ? Math.sin(t * 8 + Math.PI) * 7 : 0;

  // ── Sandals ───────────────────────────────────────────────────────────────
  ctx.fillStyle = sandal;
  ctx.fillRect(-11, -3 + sw*0.3,  10, 3);   // back foot
  ctx.fillRect(  1, -3 - sw*0.3,  10, 3);   // front foot
  // ankle straps
  ctx.fillRect(-10, -7 + sw*0.3,   8, 4);
  ctx.fillRect(  1, -7 - sw*0.3,   8, 4);
  // toe strap
  ctx.fillStyle = '#3a1808';
  ctx.fillRect( -9, -2 + sw*0.3,   7, 1);
  ctx.fillRect(  2, -2 - sw*0.3,   7, 1);

  // ── Bare legs ─────────────────────────────────────────────────────────────
  ctx.fillStyle = skin;
  ctx.fillRect(-9,  -24 + sw, 8, 17);   // back leg
  ctx.fillRect( 1,  -24 - sw, 8, 17);   // front leg
  // knee cap
  ctx.fillStyle = shadow;
  ctx.fillRect(-8,  -13 + sw, 5, 4);
  ctx.fillRect( 3,  -13 - sw, 5, 4);
  // calf muscle hint
  ctx.fillStyle = shadow;
  ctx.fillRect(-9,  -20 + sw, 3, 7);
  ctx.fillRect( 6,  -20 - sw, 3, 7);

  // ── Skirt / chiton ────────────────────────────────────────────────────────
  ctx.fillStyle = skirt;
  ctx.fillRect(-11, -28, 22,  2);   // hem
  ctx.fillRect(-10, -32, 20,  4);
  ctx.fillRect( -9, -36, 18,  4);
  ctx.fillRect( -8, -40, 16,  4);
  // fold lines
  ctx.fillStyle = skirtDk;
  for (let i = -7; i <= 7; i += 4) ctx.fillRect(i, -40, 2, 12);
  // hem shadow
  ctx.fillStyle = skirtDk;
  ctx.fillRect(-11, -27, 22, 2);

  // ── Belt ──────────────────────────────────────────────────────────────────
  ctx.fillStyle = belt;
  ctx.fillRect(-10, -42, 20, 3);
  // buckle
  ctx.fillStyle = gold;
  ctx.fillRect( -3, -43,  6, 5);
  ctx.fillStyle = '#a06810';
  ctx.fillRect( -2, -42,  4, 3);

  // ── Torso (bare, muscular) ────────────────────────────────────────────────
  ctx.fillStyle = skin;
  ctx.fillRect(-10, -62, 20, 20);   // main body (wider than prince)
  // pectorals
  ctx.fillStyle = shadow;
  ctx.fillRect( -9, -61,  8,  8);   // left pec hollow
  ctx.fillRect(  1, -61,  8,  8);   // right pec hollow
  ctx.fillStyle = skin;
  ctx.fillRect( -9, -61,  6,  6);   // left pec raised
  ctx.fillRect(  3, -61,  6,  6);   // right pec raised
  // sternum
  ctx.fillStyle = shadow;
  ctx.fillRect( -1, -60,  2, 16);
  // abs (2 rows)
  ctx.fillStyle = shadow;
  ctx.fillRect( -7, -50,  5,  3);  ctx.fillRect( 2, -50, 5, 3);
  ctx.fillRect( -7, -45,  5,  3);  ctx.fillRect( 2, -45, 5, 3);
  ctx.fillRect( -7, -40,  5,  2);  ctx.fillRect( 2, -40, 5, 2);
  // obliques
  ctx.fillStyle = shadow;
  ctx.fillRect(-10, -56,  3,  8);
  ctx.fillRect(  7, -56,  3,  8);

  // ── Shoulders (broad) ─────────────────────────────────────────────────────
  ctx.fillStyle = skin;
  ctx.fillRect(-14, -62,  5, 12);   // left shoulder mass
  ctx.fillRect(  9, -62,  5, 12);   // right shoulder mass
  ctx.fillStyle = shadow;
  ctx.fillRect(-14, -60,  4,  5);
  ctx.fillRect(  10,-60,  4,  5);

  // ── Arms ──────────────────────────────────────────────────────────────────
  if (pose === 'strike') {
    // right arm raised + club
    ctx.fillStyle = skin;
    ctx.fillRect( 8, -76,  6, 16);   // upper arm
    ctx.fillRect(10, -86,  5, 12);   // forearm
    // bicep bulge
    ctx.fillStyle = shadow;
    ctx.fillRect( 8, -72,  4,  5);
    // left arm guard
    ctx.fillStyle = skin;
    ctx.fillRect(-14,-58,  5, 14);
    ctx.fillRect(-13,-46,  4, 10);
    // club
    ctx.fillStyle = '#6a3a10';
    ctx.fillRect(12, -102, 5, 18);
    ctx.fillStyle = '#4a2808';
    ctx.fillRect(10, -110,  9,  9);
    ctx.fillRect( 9, -111, 11,  3);
    ctx.fillStyle = '#8a5020';
    ctx.fillRect(10, -108,  4,  3);
  } else {
    // arms down with swing
    ctx.fillStyle = skin;
    ctx.fillRect(-14, -62+armSw,  5, 14);
    ctx.fillRect(-13, -50+armSw,  4, 10);
    ctx.fillRect(  9, -62-armSw,  5, 14);
    ctx.fillRect( 10, -50-armSw,  4, 10);
    // bicep
    ctx.fillStyle = shadow;
    ctx.fillRect(-13, -56+armSw,  3,  5);
    ctx.fillRect(  9, -56-armSw,  3,  5);
    // club resting at side (idle/walk/run)
    ctx.fillStyle = '#6a3a10';
    ctx.fillRect(12, -62-armSw,  4, 24);
    ctx.fillStyle = '#4a2808';
    ctx.fillRect(10, -66-armSw,  8,  6);
    ctx.fillRect( 9, -67-armSw, 10,  3);
  }

  // ── Head ──────────────────────────────────────────────────────────────────
  const hY = pose === 'strike' ? -78 : -78;
  ctx.fillStyle = skin;
  ctx.fillRect(-7, hY,   14, 16);
  // jaw
  ctx.fillRect(-6, hY+12, 12,  4);
  // ears
  ctx.fillRect(-9, hY+5,  2,  5);
  ctx.fillRect( 7, hY+5,  2,  5);

  // ── Hair ──────────────────────────────────────────────────────────────────
  ctx.fillStyle = hair;
  ctx.fillRect(-7, hY,    14,  6);   // top
  ctx.fillRect(-8, hY+2,   3,  7);   // left lock
  ctx.fillRect( 5, hY+2,   4,  6);   // right lock
  ctx.fillRect(-7, hY+12,  4,  6);   // sideburn left
  ctx.fillRect( 3, hY+12,  4,  6);   // sideburn right

  // laurel wreath
  ctx.fillStyle = leaf;
  ctx.fillRect(-8, hY+1,  16,  3);
  // wreath berries
  ctx.fillStyle = '#80c040';
  ctx.fillRect(-6, hY,     2,  2);
  ctx.fillRect(-1, hY-1,   2,  2);
  ctx.fillRect( 4, hY,     2,  2);

  // ── Face ──────────────────────────────────────────────────────────────────
  // brows (heroic frown)
  ctx.fillStyle = hair;
  ctx.fillRect(-5, hY+7,   4,  2);
  ctx.fillRect( 1, hY+7,   4,  2);
  // eyes
  ctx.fillStyle = '#0a0818';
  ctx.fillRect(-4, hY+9,   3,  2);
  ctx.fillRect( 1, hY+9,   3,  2);
  // nose bridge
  ctx.fillStyle = shadow;
  ctx.fillRect(-1, hY+10,  2,  4);
  // mouth (determined)
  ctx.fillStyle = shadow;
  ctx.fillRect(-3, hY+14,  6,  1);
}

// ── Setup canvases ────────────────────────────────────────────────────────────
const CONCEPTS = [
  { id:'A', label:'Option A — Bronze Hero',
    desc:'Classic bronze skin, golden lion-skin skirt',
    palette: PALETTES.A },
  { id:'B', label:'Option B — White Cloth',
    desc:'Olive skin, white linen chiton, leather sandals',
    palette: PALETTES.B, highlight: true },
  { id:'C', label:'Option C — Crimson Warrior',
    desc:'Bronze skin, blood-red battle skirt, gold belt',
    palette: PALETTES.C },
  { id:'D', label:'Option D — Amber Pelt',
    desc:'Dark bronze, amber lion-pelt skirt',
    palette: PALETTES.D },
];

const POSES = ['idle','run','strike'];
const POSE_LABELS = { idle:'Idle', run:'Run', strike:'Strike' };

// Canvas dimensions — character needs ~115px height at scale 2
const S  = 2;        // draw scale
const CW = 110;      // canvas px wide
const CH = 280;      // canvas px tall
const OX = CW / 2;  // origin x
const OY = CH - 10; // origin y (bottom, with margin)

const root = document.getElementById('root');
const animCanvases = [];   // { canvas, palette }

CONCEPTS.forEach(c => {
  const wrap = document.createElement('div');
  wrap.className = 'concept' + (c.highlight ? ' highlight' : '');

  const lbl = document.createElement('div');
  lbl.className = 'concept-label';
  lbl.textContent = c.label;
  wrap.appendChild(lbl);

  const poses = document.createElement('div');
  poses.className = 'poses';

  POSES.forEach(pose => {
    const poseWrap = document.createElement('div');
    poseWrap.className = 'pose';

    const cv = document.createElement('canvas');
    cv.width  = CW;
    cv.height = CH;
    cv.style.width  = CW + 'px';
    cv.style.height = CH + 'px';

    if (pose === 'run') {
      animCanvases.push({ canvas: cv, palette: c.palette });
    } else {
      const ctx = cv.getContext('2d');
      ctx.save();
      ctx.translate(OX, OY);
      ctx.scale(S, S);
      drawHercules(ctx, c.palette, pose);
      ctx.restore();
    }

    const pl = document.createElement('div');
    pl.className = 'pose-label';
    pl.textContent = POSE_LABELS[pose];

    poseWrap.appendChild(cv);
    poseWrap.appendChild(pl);
    poses.appendChild(poseWrap);
  });

  wrap.appendChild(poses);

  const desc = document.createElement('div');
  desc.className = 'concept-desc';
  desc.textContent = c.desc;
  wrap.appendChild(desc);

  root.appendChild(wrap);
});

// ── Animation loop (run pose only) ───────────────────────────────────────────
function animate() {
  animCanvases.forEach(({ canvas, palette }) => {
    const ctx = canvas.getContext('2d');
    ctx.clearRect(0, 0, CW, CH);
    ctx.fillStyle = '#0c0804';
    ctx.fillRect(0, 0, CW, CH);
    ctx.save();
    ctx.translate(OX, OY);
    ctx.scale(S, S);
    drawHercules(ctx, palette, 'run');
    ctx.restore();
  });
  requestAnimationFrame(animate);
}
requestAnimationFrame(animate);
</script>
</body>
</html>
