<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Guard Character Concepts</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#0e0818;color:#e8d8f0;font-family:'Courier New',monospace;
     display:flex;flex-direction:column;align-items:center;padding:30px;gap:24px}
h1{color:#e040c0;letter-spacing:4px;text-transform:uppercase;font-size:1.1rem}
.subtitle{color:#7a5880;font-size:0.72rem;text-align:center}
.grid{display:flex;flex-wrap:wrap;gap:28px;justify-content:center;max-width:900px}
.card{display:flex;flex-direction:column;align-items:center;gap:8px}
.card-label{color:#c040a0;font-size:0.65rem;letter-spacing:2px;text-transform:uppercase;text-align:center}
.card-sub{color:#7a5880;font-size:0.58rem;text-align:center;line-height:1.5;max-width:90px}
.poses{display:flex;gap:6px;align-items:flex-end}
.pose{display:flex;flex-direction:column;align-items:center;gap:4px}
.pose-lbl{color:#4a3060;font-size:0.55rem;letter-spacing:1px}
canvas{image-rendering:pixelated;border:1px solid #2a1040;background:#080410}
</style>
</head>
<body>

<h1>Guard Squad — Character Concepts</h1>
<p class="subtitle">Rectangle sprites · various Speedos · manly proportions · big energy</p>

<div class="grid" id="root"></div>

<script>
// ── Character configs ─────────────────────────────────────────────────────────
const GUARDS = [
  {
    label:'Hot Pink', sub:'Mohawk · Light skin',
    skin:'#e8c898', shadow:'#c0a070', hi:'#f8e0b0',
    speedo:'#f01890', speedoDk:'#b00060',
    hair:'#1a1010', hairstyle:'mohawk',
  },
  {
    label:'Electric Cyan', sub:'Buzzcut · Brown skin',
    skin:'#c08848', shadow:'#9a6828', hi:'#d4a060',
    speedo:'#00d0f0', speedoDk:'#0090b0',
    hair:'#1a0c00', hairstyle:'buzzcut',
  },
  {
    label:'Lemon Yellow', sub:'Curly · Dark skin',
    skin:'#8a5028', shadow:'#6a3810', hi:'#a86838',
    speedo:'#f0d010', speedoDk:'#c0a000',
    hair:'#0e0808', hairstyle:'curly',
  },
  {
    label:'Hot Orange', sub:'Pompadour · Tan skin',
    skin:'#d4a060', shadow:'#a87840', hi:'#e8b878',
    speedo:'#f06010', speedoDk:'#c04000',
    hair:'#180c00', hairstyle:'pompadour',
  },
  {
    label:'Royal Purple', sub:'Long hair · Ebony skin',
    skin:'#60301a', shadow:'#3e1c08', hi:'#804028',
    speedo:'#8020d0', speedoDk:'#5010a0',
    hair:'#0a0408', hairstyle:'long',
  },
  {
    label:'Neon Green', sub:'Bald · Medium skin',
    skin:'#b07840', shadow:'#8a5828', hi:'#c89050',
    speedo:'#20d040', speedoDk:'#108020',
    hair:'#1a0c00', hairstyle:'bald',
  },
  {
    label:'Scarlet Red', sub:'Flat-top · Light-brown',
    skin:'#c89058', shadow:'#a07038', hi:'#dcaa70',
    speedo:'#e01020', speedoDk:'#a00010',
    hair:'#100808', hairstyle:'flattop',
  },
  {
    label:'Cobalt Blue', sub:'Undercut · Pale skin',
    skin:'#e4c8a0', shadow:'#c0a070', hi:'#f4dab8',
    speedo:'#2050e8', speedoDk:'#1030b0',
    hair:'#0c0c18', hairstyle:'undercut',
  },
];

// ── Draw one guard ─────────────────────────────────────────────────────────────
// Origin = bottom-centre of feet. All in game-px (scale applied by caller).
function drawGuard(ctx, g, pose) {
  const { skin, shadow, hi, speedo, speedoDk, hair, hairstyle } = g;
  const t = performance.now() / 1000;

  // leg swing for run
  const sw  = pose === 'run'  ? Math.sin(t * 9) * 10 : 0;
  const asw = pose === 'run'  ? Math.sin(t * 9 + Math.PI) * 8 : 0;
  const strk= pose === 'strike';

  // ── Feet / sandals ────────────────────────────────────────────────────────
  ctx.fillStyle = '#3a2010';
  ctx.fillRect(-12, -3 + sw * 0.4, 11, 3);   // back foot
  ctx.fillRect(  1, -3 - sw * 0.4, 11, 3);   // front foot

  // ── Thick legs ────────────────────────────────────────────────────────────
  ctx.fillStyle = skin;
  ctx.fillRect(-11, -26 + sw, 10, 23);  // back leg
  ctx.fillRect(  1, -26 - sw, 10, 23);  // front leg
  // quad definition
  ctx.fillStyle = shadow;
  ctx.fillRect(-11, -22 + sw, 4, 10);
  ctx.fillRect(  7, -22 - sw, 4, 10);
  // knee
  ctx.fillStyle = shadow;
  ctx.fillRect(-10, -10 + sw, 7, 5);
  ctx.fillRect(  3, -10 - sw, 7, 5);
  ctx.fillStyle = hi;
  ctx.fillRect( -9, -10 + sw, 4, 3);
  ctx.fillRect(  3, -10 - sw, 4, 3);
  // calf
  ctx.fillStyle = shadow;
  ctx.fillRect(-11, -20 + sw, 4, 10);
  ctx.fillRect(  7, -20 - sw, 4, 10);

  // ── Speedo / swimwear ─────────────────────────────────────────────────────
  // front pouch
  ctx.fillStyle = speedo;
  ctx.fillRect(-9, -34,  18,  9);   // main brief
  ctx.fillRect(-7, -36,  14,  3);   // waistband top
  // side panels
  ctx.fillStyle = speedoDk;
  ctx.fillRect(-9, -34,   3,  9);   // left side
  ctx.fillRect( 6, -34,   3,  9);   // right side
  // waistband
  ctx.fillStyle = speedoDk;
  ctx.fillRect(-9, -36,  18,  2);
  // centre seam
  ctx.fillStyle = speedoDk;
  ctx.fillRect(-1, -34,   2,  7);

  // ── Big glutes (back view hint on sides) ──────────────────────────────────
  ctx.fillStyle = skin;
  ctx.fillRect(-13, -36,  4,  9);   // left glute
  ctx.fillRect(  9, -36,  4,  9);   // right glute
  ctx.fillStyle = shadow;
  ctx.fillRect(-13, -32,  4,  5);
  ctx.fillRect(  9, -32,  4,  5);

  // ── V-taper torso — contiguous skin from belt to chest ───────────────────
  ctx.fillStyle = skin;
  ctx.fillRect( -9, -42,  18, 18);   // belly/waist  y=-42→-24 (sits above belt)
  ctx.fillRect( -9, -60,  18, 18);   // mid section  y=-60→-42
  ctx.fillRect(-11, -68,  22,  8);   // upper torso  y=-68→-60
  ctx.fillRect(-13, -78,  26, 10);   // chest        y=-78→-68

  // pecs — big and defined
  ctx.fillStyle = shadow;
  ctx.fillRect(-12, -77,  11,  9);   // left pec hollow
  ctx.fillRect(  1, -77,  11,  9);   // right pec hollow
  ctx.fillStyle = skin;
  ctx.fillRect(-11, -76,   9,  7);
  ctx.fillRect(  2, -76,   9,  7);
  ctx.fillStyle = hi;
  ctx.fillRect(-10, -75,   5,  3);
  ctx.fillRect(  5, -75,   5,  3);

  // nipples
  ctx.fillStyle = shadow;
  ctx.fillRect( -7, -69,  3, 2);
  ctx.fillRect(  4, -69,  3, 2);

  // ── Abs — grooves cut into solid skin ────────────────────────────────────
  // Center groove (sternum + belly button line)
  ctx.fillStyle = shadow;
  ctx.fillRect(-1, -76,  2, 36);
  // Horizontal grooves between ab rows
  ctx.fillRect(-9, -62,  18,  2);   // groove: pec bottom / upper abs top
  ctx.fillRect(-9, -54,  18,  2);   // groove: upper abs / mid abs
  ctx.fillRect(-9, -46,  18,  2);   // groove: mid abs / lower abs
  ctx.fillRect(-9, -38,  18,  2);   // groove: lower abs / belt
  // Highlights on each ab block
  ctx.fillStyle = hi;
  ctx.fillRect(-8, -61,   6,  5);   ctx.fillRect(2, -61,  6,  5);  // upper abs
  ctx.fillRect(-8, -53,   6,  5);   ctx.fillRect(2, -53,  6,  5);  // mid abs
  ctx.fillRect(-8, -45,   6,  5);   ctx.fillRect(2, -45,  6,  5);  // lower abs

  // Obliques
  ctx.fillStyle = shadow;
  ctx.fillRect(-11, -62,  3, 22);
  ctx.fillRect(  8, -62,  3, 22);

  // ── Wide shoulders ────────────────────────────────────────────────────────
  ctx.fillStyle = skin;
  ctx.fillRect(-18, -78,  6, 12);
  ctx.fillRect( 12, -78,  6, 12);
  ctx.fillStyle = shadow;
  ctx.fillRect(-18, -76,  5,  6);
  ctx.fillRect( 13, -76,  5,  6);
  ctx.fillStyle = hi;
  ctx.fillRect(-17, -76,  3,  3);
  ctx.fillRect( 14, -76,  3,  3);

  // ── Arms ──────────────────────────────────────────────────────────────────
  ctx.fillStyle = skin;
  if (strk) {
    // right arm punching forward
    ctx.fillRect( 12, -90,  6, 16);   // upper arm
    ctx.fillRect( 14, -98,  5, 10);   // forearm
    ctx.fillStyle = shadow;
    ctx.fillRect( 12, -86,  4,  6);   // bicep
    // left arm guard
    ctx.fillStyle = skin;
    ctx.fillRect(-18, -78,  6, 16);
    ctx.fillRect(-16, -65,  5, 12);
    ctx.fillStyle = shadow;
    ctx.fillRect(-18, -73,  4,  6);
    // fist
    ctx.fillStyle = skin;
    ctx.fillRect( 13,-100,  7,  6);
    ctx.fillStyle = shadow;
    ctx.fillRect( 13,-100,  7,  2);
  } else {
    ctx.fillRect(-18, -78 + asw,  6, 16);
    ctx.fillRect(-16, -65 + asw,  5, 12);
    ctx.fillRect( 12, -78 - asw,  6, 16);
    ctx.fillRect( 14, -65 - asw,  5, 12);
    ctx.fillStyle = shadow;
    ctx.fillRect(-18, -73 + asw,  4,  6);
    ctx.fillRect( 12, -73 - asw,  4,  6);
    // forearm detail
    ctx.fillStyle = shadow;
    ctx.fillRect(-16, -60 + asw,  3,  7);
    ctx.fillRect( 14, -60 - asw,  3,  7);
  }

  // ── Head ──────────────────────────────────────────────────────────────────
  const hY = -94;
  ctx.fillStyle = skin;
  ctx.fillRect(-8, hY,    16, 16);   // head
  ctx.fillRect(-6, hY+13,  12,  4);  // strong jaw
  // ears
  ctx.fillStyle = shadow;
  ctx.fillRect(-10, hY+5,   2,  6);
  ctx.fillRect(  8, hY+5,   2,  6);
  // neck
  ctx.fillStyle = skin;
  ctx.fillRect(-5, hY+16,  10,  4);
  ctx.fillStyle = shadow;
  ctx.fillRect(-5, hY+16,   3,  4);
  ctx.fillRect( 3, hY+16,   2,  4);

  // ── Face ──────────────────────────────────────────────────────────────────
  ctx.fillStyle = shadow;
  ctx.fillRect(-1, hY+8,   2,  5);   // nose
  ctx.fillRect(-5, hY+13,  3,  2);   // left cheek
  ctx.fillRect( 2, hY+13,  3,  2);
  // brow ridge
  ctx.fillStyle = shadow;
  ctx.fillRect(-6, hY+5,   5,  2);
  ctx.fillRect( 1, hY+5,   5,  2);
  // eyes
  ctx.fillStyle = '#080818';
  ctx.fillRect(-5, hY+7,   4,  3);
  ctx.fillRect( 1, hY+7,   4,  3);
  ctx.fillStyle = '#2040e0';  // iris
  ctx.fillRect(-4, hY+8,   2,  2);
  ctx.fillRect( 2, hY+8,   2,  2);
  // mouth
  ctx.fillStyle = shadow;
  ctx.fillRect(-3, hY+13,  6,  1);

  // ── Hairstyle ─────────────────────────────────────────────────────────────
  ctx.fillStyle = hair;
  switch (hairstyle) {
    case 'mohawk':
      ctx.fillRect(-2, hY-12,  4, 12);
      ctx.fillRect(-1, hY-16,  2,  6);
      ctx.fillStyle = '#c02020';
      ctx.fillRect(-2, hY-14,  4,  6);
      ctx.fillStyle = '#e04020';
      ctx.fillRect(-1, hY-16,  2,  4);
      // sides shaved
      ctx.fillStyle = skin;
      ctx.fillRect(-8, hY,  4,  5);
      ctx.fillRect( 4, hY,  4,  5);
      break;
    case 'buzzcut':
      ctx.fillRect(-8, hY,   16, 4);
      ctx.fillRect(-7, hY-2, 14, 3);
      break;
    case 'curly':
      // clusters of small curls
      for (let cx=-7; cx<=5; cx+=3)
        ctx.fillRect(cx, hY-3, 3, 5);
      for (let cx=-5; cx<=4; cx+=3)
        ctx.fillRect(cx, hY-7, 3, 5);
      ctx.fillRect(-4, hY-9, 8, 4);
      break;
    case 'pompadour':
      // swept-back quiff
      ctx.fillRect(-6, hY-8,  12, 4);
      ctx.fillRect(-4, hY-12, 10, 5);
      ctx.fillRect(-2, hY-14,  6, 4);
      ctx.fillRect( 0, hY-15,  3, 3);
      ctx.fillStyle = '#3a2010';  // dark undercut
      ctx.fillRect(-8, hY,    4, 5);
      break;
    case 'long':
      ctx.fillRect(-8, hY,    16, 5);
      ctx.fillRect(-9, hY+4,   3, 14);  // left flow
      ctx.fillRect( 6, hY+4,   3, 14);  // right flow
      ctx.fillRect(-9, hY+16,  3,  4);
      ctx.fillRect( 6, hY+16,  3,  4);
      break;
    case 'bald':
      // just a shine
      ctx.fillStyle = hi;
      ctx.fillRect(-4, hY+1,  4, 3);
      break;
    case 'flattop':
      ctx.fillRect(-8, hY-6, 16, 6);   // flat top slab
      ctx.fillRect(-9, hY-6,  2, 6);   // left wall
      ctx.fillRect( 7, hY-6,  2, 6);   // right wall
      break;
    case 'undercut':
      ctx.fillRect(-7, hY-6, 14, 6);   // top swept
      ctx.fillRect(-5, hY-8, 10, 3);   // slight pompadour
      // shaved sides stay skin-coloured
      break;
  }

  // moustache / stubble on some
  if (['pompadour','flattop','bald'].includes(hairstyle)) {
    ctx.fillStyle = hair;
    ctx.fillRect(-3, hY+12, 6, 2);
  }
}

// ── Canvas constants ──────────────────────────────────────────────────────────
const S  = 2;
const CW = 100;
const CH = 240;
const OX = CW / 2;
const OY = CH - 6;

const POSES = ['idle','run','strike'];
const PLBLS = { idle:'Idle', run:'Run', strike:'Strike' };

const root = document.getElementById('root');
const animList = [];   // {canvas, guard} for run animation

GUARDS.forEach(g => {
  const card = document.createElement('div');
  card.className = 'card';

  const lbl = document.createElement('div');
  lbl.className = 'card-label';
  lbl.textContent = g.label;
  card.appendChild(lbl);

  const poses = document.createElement('div');
  poses.className = 'poses';

  POSES.forEach(pose => {
    const pw = document.createElement('div');
    pw.className = 'pose';

    const cv = document.createElement('canvas');
    cv.width  = CW;
    cv.height = CH;
    cv.style.width  = CW + 'px';
    cv.style.height = CH + 'px';

    if (pose === 'run') {
      animList.push({ canvas: cv, guard: g });
    } else {
      const ctx = cv.getContext('2d');
      ctx.fillStyle = '#080410';
      ctx.fillRect(0,0,CW,CH);
      ctx.save();
      ctx.translate(OX, OY);
      ctx.scale(S, S);
      drawGuard(ctx, g, pose);
      ctx.restore();
    }

    const pl = document.createElement('div');
    pl.className = 'pose-lbl';
    pl.textContent = PLBLS[pose];

    pw.appendChild(cv);
    pw.appendChild(pl);
    poses.appendChild(pw);
  });

  card.appendChild(poses);

  const sub = document.createElement('div');
  sub.className = 'card-sub';
  sub.textContent = g.sub;
  card.appendChild(sub);

  root.appendChild(card);
});

// ── Animation loop ────────────────────────────────────────────────────────────
function loop() {
  animList.forEach(({ canvas, guard }) => {
    const ctx = canvas.getContext('2d');
    ctx.fillStyle = '#080410';
    ctx.fillRect(0, 0, CW, CH);
    ctx.save();
    ctx.translate(OX, OY);
    ctx.scale(S, S);
    drawGuard(ctx, guard, 'run');
    ctx.restore();
  });
  requestAnimationFrame(loop);
}
requestAnimationFrame(loop);
</script>
</body>
</html>
